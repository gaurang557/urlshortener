<!DOCTYPE html>
<html>
<head>
    <title>NanoLink | Fast URL Shortener</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <h1 class="logo">🚀 NanoLink</h1>
    {% if user.is_authenticated %}
    <a href="/dashboard/">Dashboard</a>
    <a href="/logout/">Logout</a>
    {% else %}
    <a href="/login/">Login</a>
    <a href="/signup">Signup</a>

    {% endif %}
    <p class="tagline">Fast, simple URL shortening</p>
    <h2>🔗 Shorten your url</h2>
    
    <form id="shorten-form">
        <input type="text" id="url" value="https://" placeholder="Enter URL" required />
        <button type="submit">Shorten</button>
    </form>
    
    {% load static %}
    <script src="{% static 'core/index.js' %}"></script>
    <p id="result"></p>

    <p class="footer">
    Built by Gaurang • <a target="_blank" style="color: #aaa;" href="https://github.com/gaurang557/urlshortener">
        Git repo</a>
</p>
</body>
</html>
